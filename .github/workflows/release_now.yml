name: Release current build

on:
  workflow_dispatch:
  workflow_call:
  workflow_run:
    workflows: ["Build check"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  check-changes:
    name: Check for changes since last release
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      has_changes: ${{ steps.changelog.outputs.has_changes }}
      version: ${{ steps.version.outputs.version }}
      log: ${{ steps.changelog.outputs.log }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute date version
        id: version
        run: echo "version=$(date -u +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Generate changelog since last release
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}$' | head -n 1)
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log "$LAST_TAG"..HEAD --pretty=format:'- %s' --no-merges)
          else
            LOG=$(git log --pretty=format:'- %s' --no-merges -n 30)
          fi
          if [ -z "$LOG" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            LOG="- No code changes since last release"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          {
            echo "log<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

  build:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/build.yml

  release:
    name: Create release
    runs-on: ubuntu-22.04
    needs: [check-changes, build]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cemu-bin-linux-x64
          path: cemu-bin-linux-x64
      - uses: actions/download-artifact@v8
        with:
          name: cemu-appimage-x64
          path: cemu-appimage-x64
      - uses: actions/download-artifact@v8
        with:
          name: cemu-bin-windows-x64
          path: cemu-bin-windows-x64
      - uses: actions/download-artifact@v8
        with:
          name: cemu-installer-windows-x64
          path: cemu-installer-windows-x64

      - name: Package assets
        env:
          VERSION: ${{ needs.check-changes.outputs.version }}
        run: |
          sudo apt install -y zip
          mkdir upload

          mkdir "Cemu_$VERSION"
          cp -R cemu-bin-linux-x64/. "Cemu_$VERSION/"
          zip -9 -r "upload/cemu-$VERSION-ubuntu-22.04-x64.zip" "Cemu_$VERSION"
          rm -r "Cemu_$VERSION"

          mkdir "Cemu_$VERSION"
          cp -R cemu-bin-windows-x64/. "Cemu_$VERSION/"
          zip -9 -r "upload/cemu-$VERSION-windows-x64.zip" "Cemu_$VERSION"
          rm -r "Cemu_$VERSION"

          cp cemu-installer-windows-x64/*.exe "upload/cemu-$VERSION-windows-x64-installer.exe"
          mv cemu-appimage-x64/Cemu-*-x86_64.AppImage "upload/Cemu-$VERSION-x86_64.AppImage"

      - name: Create or replace release
        env:
          VERSION: ${{ needs.check-changes.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          wget -q -O ghr.tar.gz https://github.com/tcnksm/ghr/releases/download/v0.15.0/ghr_v0.15.0_linux_amd64.tar.gz
          tar xzf ghr.tar.gz; rm ghr.tar.gz
          ghr_v0.15.0_linux_amd64/ghr -replace -t "$GH_TOKEN" -n "Cemu $VERSION" -b "${{ needs.check-changes.outputs.log }}" "v$VERSION" ./upload
