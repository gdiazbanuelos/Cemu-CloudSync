name: Sync upstream and release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # once a day at 06:00 UTC

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/cemu-project/Cemu.git
          git fetch upstream main

      - name: Merge upstream/main into main
        run: git merge upstream/main --no-edit

      - name: Push to fork
        run: git push origin main

  release:
    name: Build and release merged code
    needs: sync
    uses: ./.github/workflows/release_now.yml
